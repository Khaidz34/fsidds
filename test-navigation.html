<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Navigation</title>
<style>
.page {
  display: none;
  padding: 20px;
  border: 2px solid #ccc;
  margin: 10px;
}

.page.active {
  display: block;
  border-color: #0056D2;
  background: #f0f4ff;
}

.nav-link {
  padding: 10px 20px;
  margin: 5px;
  background: #f0f0f0;
  border: none;
  cursor: pointer;
  border-radius: 8px;
}

.nav-link.active {
  background: #0056D2;
  color: white;
}
</style>
</head>
<body>

<h1>Test Navigation System</h1>

<div style="margin: 20px;">
  <button class="nav-link active" onclick="showPage('dashboard')">Dashboard</button>
  <button class="nav-link" onclick="showPage('order')">Đặt cơm</button>
  <button class="nav-link" onclick="showPage('myOrders')">Đơn của tôi</button>
  <button class="nav-link" onclick="showPage('allOrders')">Tất cả đơn</button>
</div>

<div id="dashboardPage" class="page active" style="display:block;">
  <h2>📊 Dashboard</h2>
  <p>Đây là trang Dashboard</p>
</div>

<div id="orderPage" class="page" style="display:none;">
  <h2>🍽️ Đặt cơm hôm nay</h2>
  <p>Đây là trang đặt cơm</p>
</div>

<div id="myOrdersPage" class="page" style="display:none;">
  <h2>📋 Đơn của tôi</h2>
  <p>Đây là trang đơn của tôi</p>
</div>

<div id="allOrdersPage" class="page" style="display:none;">
  <h2>📦 Tất cả đơn</h2>
  <p>Đây là trang tất cả đơn</p>
</div>

<script>
function showPage(pageId) {
  console.log('Showing page:', pageId);
  
  // Hide all pages
  document.querySelectorAll('.page').forEach(p => {
    p.classList.remove('active');
    p.style.display = 'none';
  });
  
  // Remove active from all nav links
  document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
  
  // Show selected page
  const page = document.getElementById(pageId + 'Page');
  if (page) {
    page.classList.add('active');
    page.style.display = 'block';
    console.log('Page shown:', pageId);
  } else {
    console.error('Page not found:', pageId + 'Page');
  }
  
  // Update active nav link
  document.querySelectorAll('.nav-link').forEach(link => {
    if (link.getAttribute('onclick')?.includes(pageId)) {
      link.classList.add('active');
    }
  });
}
</script>

</body>
</html>
